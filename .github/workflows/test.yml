# Trimmed replica of facebookresearch/fairchem test.yml — preserves the exact
# vulnerable mechanic: workflow_run after "contributor check" -> checkout PR head
# commit -> execute it (pip install of a local package runs its setup.py) with a
# repository secret in the environment. No actor/authorization guard.
#
# On real fairchem, HF_TOKEN is directly in the setup.py step's env, and
# CODECOV_TOKEN becomes reachable one step later in the attacker-controlled
# pytest step. To keep the replica single-step (and unambiguous), all three
# secrets are exposed together here. The mechanic (attacker code + secrets in
# env) is identical.
name: tests

on:
  workflow_run:
    workflows:
      - "contributor check"
    types:
      - completed

env:
  HEAD_SHA: |
    ${{
      github.event.workflow_run.head_sha ||
      github.event.pull_request.head.sha ||
      github.sha
    }}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout PR head (untrusted)
        uses: actions/checkout@v4
        with:
          ref: ${{ env.HEAD_SHA }}
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # This is the sink: installing a local package executes its setup.py,
      # i.e. attacker-controlled code from the PR, with the secrets in env.
      - name: Install package (executes PR setup.py)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          ACTIONS_DEPLOY_KEY: ${{ secrets.ACTIONS_DEPLOY_KEY }}
        run: |
          python -m pip install --upgrade pip
          pip install ./packages/pkg
      # PoC evidence surface. setup.py writes /tmp/pwn_marker.txt with the
      # observed secret lengths. We cat it to make the proof visible in the
      # public run log. The vulnerable mechanic is unchanged.
      - name: Show PoC marker
        if: always()
        run: |
          echo "--- BEGIN PWN MARKER FILE ---"
          cat /tmp/pwn_marker.txt || echo "(marker file not present)"
          echo "--- END PWN MARKER FILE ---"
