# Faithful trim of facebookresearch/fairchem test.yml at pinned main SHA
# 475b2e033e20626a8cd2acba86051c649ecf928e.
#
# Key property vs the earlier setup.py replica: this test.yml matches
# fairchem's actual step-and-env layout — the `pip install` step has NO
# secrets in its env, and HF_TOKEN is set only on the subsequent `pytest`
# step, exactly as in fairchem lines 100-146. Attacker code executes when
# pytest imports/collects a PR-provided conftest.py, at which point the
# process environment contains HF_TOKEN.
name: tests

on:
  workflow_run:
    workflows:
      - "contributor check"
    types:
      - completed

env:
  HEAD_SHA: |
    ${{
      github.event.workflow_run.head_sha ||
      github.event.pull_request.head.sha ||
      github.sha
    }}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # fairchem test.yml also grants statuses:write for multi-trigger-setup.
      # Not needed for the PoC.
    steps:
      # Same trigger + ref plumbing as fairchem.
      - name: Checkout PR head (untrusted)
        uses: actions/checkout@v4
        with:
          ref: ${{ env.HEAD_SHA }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Matches fairchem line 100-113: `pip install packages/fairchem-core[dev,extras]`
      # with NO env: block on this step. HF_TOKEN is intentionally NOT set here.
      # A payload placed in setup.py cannot read HF_TOKEN — this is the CORRECTION
      # of the earlier PoC and is what the triager review demanded.
      - name: Install core dependencies and package
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install ./packages/pkg

      # Matches fairchem lines 133-146: `pytest ${{ matrix.shard.paths }}` under
      # `env: HF_TOKEN: ${{ secrets.HF_TOKEN }}`. This is the step where the
      # attacker's PR-provided conftest.py (or any test_*.py) is imported by
      # pytest during collection, giving the attacker code exec inside a
      # process whose env carries HF_TOKEN.
      - name: Core tests (units)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pytest tests/ -v

      # PoC evidence surface. conftest.py (attacker-controlled, collected by
      # pytest during test discovery) writes /tmp/pwn_marker.txt with a
      # length-only observation. This step cats it so the proof appears in
      # the public run log. The vulnerable mechanic is unchanged.
      - name: Show PoC marker
        if: always()
        run: |
          echo "--- BEGIN PWN MARKER FILE ---"
          cat /tmp/pwn_marker.txt || echo "(marker file not present)"
          echo "--- END PWN MARKER FILE ---"
